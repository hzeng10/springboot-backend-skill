# 测试 Profile（Testcontainers @ServiceConnection 自动覆盖数据源配置）

# Flyway 加载测试专用迁移（可选）
# spring.flyway.locations=classpath:db/migration,classpath:db/test-migration

# 禁用 Modulith 事件表自动建表（测试环境通常用 Flyway 或已存在）
spring.modulith.events.jdbc.schema-initialization.enabled=false

# 详细日志（测试时便于排查）
logging.level.com.example=DEBUG
logging.level.org.springframework.web=DEBUG

# 关闭 Docker Compose 自动启动（Testcontainers 接管）
spring.docker.compose.enabled=false
